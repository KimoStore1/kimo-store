<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كيمو ستور - Kimo Store</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        header { background: #000; color: #ffcc00; text-align: center; padding: 20px; }
        .logo { width: 100px; border-radius: 50%; border: 2px solid #ffcc00; }
        
        /* تنظيم المنتجات بشكل شبكة */
        .product-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            padding: 15px; 
        }
        
        .product-card { 
            background: white; 
            padding: 10px; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            text-align: center; 
        }

        /* تحديد حجم ثابت للصور عشان ما تطلعش كبيرة */
        .product-card img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 8px;  
        }

        .price { color: #27ae60; font-weight: bold; margin: 10px 0; }
        button { background: #27ae60; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <img src="1000740086.png" class="logo">
        <h1>Kimo Store </h1>
    </header>

    <div class="product-list">
        <div class="product-card">
            <img src="1000740075.jpg">
            <h3>فستان كاجوال</h3>
            <div class="price">550 جنيه</div>
            <button onclick="order('فستان كاجوال')">اطلب الآن</button>
        </div>

        <div class="product-card">
            <img src="1000740077.jpg">
            <h3>طقم خروج</h3>
            <div class="price">680 جنيه</div>
            <button onclick="order('طقم خروج')">اطلب الآن</button>
        </div>

        <div class="product-card">
            <img src="1000740079.jpg">
            <h3>تيشيرت BLAKE</h3>
            <div class="price">390 جنيه</div>
            <button onclick="order('تيشيرت BLAKE')">اطلب الآن</button>
        </div>
    </div>

    <script>
        function order(item) {
            window.open('https://wa.me/201144425383?text=أريد طلب: ' + item, '_blank');
        }
    </script>
</body>
</html>
