<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كيمو ستور - Kimo Store</title>
    <style>
        body { background-color: #f4f4f4; font-family: Arial, sans-serif; margin: 0; padding-bottom: 80px; }
        header { background: #000; color: #ffcc00; text-align: center; padding: 20px; }
        .logo { width: 120px; border-radius: 50%; border: 3px solid #ffcc00; }
        .product-card { background: white; margin: 15px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { width: 100%; border-radius: 10px; }
        .price { color: #00c853; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        .footer-box { background: #1a1a1a; color: white; padding: 20px; margin: 15px; border-radius: 15px; text-align: center; }
        .floating-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: white; border-top: 1px solid #ccc; }
        .btn-whatsapp { background: #00e676; color: white; padding: 15px; flex: 1; text-align: center; text-decoration: none; font-weight: bold; }
        .btn-cart { background: #880e4f; color: white; padding: 15px; flex: 1; text-align: center; }
    </style>
</head>
<body>

    <header>
        <img src="1000740086.png" class="logo">
        <h1>كيمو ستور</h1>
        <p>مرحباً بكم في متجر كيمو ستور لأحدث صيحات الملابس</p>
    </header>

    <div class="product-card">
        <img src="1000740075.jpg">
        <h3>فستان أحمر</h3>
        <p>منتج رائع وخامة ممتازة</p>
        <div class="price">350 جنيه</div>
        <button onclick="order('فستان أحمر')" style="background:#00e676; border:none; padding:10px; width:100%; border-radius:5px; color:white;">إضافة للسلة</button>
    </div>

    <div class="footer-box">
        <h3>تواصل معنا</h3>
        <p>📍 مكاننا: القاهرة، المرج القديمة خلف نادي المرج</p>
        <p>📱 خدمة العملاء والطلبات متاحة 24 ساعة</p>
    </div>

    <div class="floating-bar">
        <div class="btn-cart">السلة (0)</div>
        <a href="#" class="btn-whatsapp" onclick="order('طلب جديد')">تأكيد الطلب (واتساب)</a>
    </div>

    <script>
        function order(item) {
            window.open('https://wa.me/201144425383?text=أريد طلب: ' + item, '_blank');
        }
    </script>
</body>
</html>
